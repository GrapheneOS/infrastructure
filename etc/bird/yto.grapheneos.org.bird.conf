define public_ipv4 = 207.174.104.20;
define public_ipv6 = 2602:fd50:1a1:20::2;
define neighbor_as = 835;
define neighbor_ipv4 = 207.174.104.2;
define neighbor_ipv6 = 2602:fd50:1a1:20::1;

filter grapheneos_filter {
    accept;
}

filter ns2_filter {
    if net = 23.149.125.0/24 || net ~ [2602:f4d9:1::/48, 2602:f4d9:3::/48] then {
        bgp_path.delete(64512);
        bgp_path.prepend(40806);
        accept;
    }

    reject;
}

log syslog all;

router id public_ipv4;

protocol device {
    scan time 10;
}

template bgp grapheneos {
    local as 40806;
    graceful restart on;
    hold time 60;
    connect delay time 0;
    connect retry time 5;
}

protocol bgp xenyth_ipv4 from grapheneos {
    multihop 2;
    source address public_ipv4;
    neighbor neighbor_ipv4 as neighbor_as;
    ipv4 {
        import none;
        export filter grapheneos_filter;
    };
}

protocol bgp xenyth_ipv6 from grapheneos {
    multihop 2;
    source address public_ipv6;
    neighbor neighbor_ipv6 as neighbor_as;
    ipv6 {
        import none;
        export filter grapheneos_filter;
    };
}

protocol bgp ns2_ipv4 from grapheneos {
    multihop 1;
    source address 91.246.30.1;
    neighbor 91.246.30.3 as 64512;
    passive;
    ipv4 {
        import filter ns2_filter;
        export none;
    };
}

protocol bgp ns2_ipv6 from grapheneos {
    multihop 1;
    source address 2602:f4d9:5::1;
    neighbor 2602:f4d9:5:2::1 as 64512;
    passive;
    ipv6 {
        import filter ns2_filter;
        export none;
    };
}

protocol static grapheneos_ipv4_route {
    route 91.246.30.0/24 via public_ipv4;
    ipv4;
}

protocol static grapheneos_ipv6_route {
    route 2602:f4d9:5::/48 via public_ipv4;
    ipv6;
}
